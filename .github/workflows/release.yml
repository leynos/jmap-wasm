name: Release

'on':
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CARGO_TERM_COLOR: always
      RELEASE_TAG: ${{ github.ref_name }}
      BUNDLE_ARTIFACT: dist/jmap-wasm32-wasip2.tar.gz
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@f9f1c863c8a5bef64aa6779caa746e1a4a6c1ad4

      - name: Install wasm target
        run: rustup target add wasm32-wasip2

      - name: Build release bundle
        run: make package

      - name: Generate changelog
        shell: bash
        run: |
          set -euo pipefail

          previous_tag="$(git tag --sort=-version:refname | grep -Fxv "${RELEASE_TAG}" | head -n1 || true)"

          {
            printf '# %s\n\n' "${RELEASE_TAG}"
            printf '## Changes\n\n'

            if [[ -n "${previous_tag}" ]]; then
              printf 'Changes since `%s`.\n\n' "${previous_tag}"
              git log --format='- %s (%h)' "${previous_tag}..${RELEASE_TAG}"
            else
              printf 'Initial release.\n\n'
              git log --format='- %s (%h)' "${RELEASE_TAG}"
            fi

            printf '\n## Artefacts\n\n'
            printf -- '- `%s`\n' "${BUNDLE_ARTIFACT}"
          } > release-notes.md

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit "${RELEASE_TAG}" \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md
            gh release upload "${RELEASE_TAG}" "${BUNDLE_ARTIFACT}" --clobber
          else
            gh release create "${RELEASE_TAG}" \
              "${BUNDLE_ARTIFACT}" \
              --title "${RELEASE_TAG}" \
              --notes-file release-notes.md
          fi
